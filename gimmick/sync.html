<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <style>
        #config,
        .cfg-row,
        body {
            display: flex
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            background: 0 0;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            user-select: none;
            font-family: Arial, sans-serif
        }

        #value {
            font-size: 2rem;
            color: #2a2a2a;
            transition: color .3s;
            text-align: center;
            width: 200px
        }

        #value.synced {
            color: #00d4ff
        }

        #value.mid {
            color: #fa0
        }

        #value.low {
            color: #ff4040
        }

        #bar-track {
            width: 200px;
            height: 3px;
            background: #1a1a1a;
            margin-top: 8px;
            overflow: hidden
        }

        #bar-fill {
            height: 100%;
            width: 0%;
            background: #00d4ff;
            transition: width .15s, background .3s
        }

        #bar-fill.mid {
            background: #fa0
        }

        #bar-fill.low {
            background: #ff4040
        }

        #config {
            position: fixed;
            top: 12px;
            left: 12px;
            background: rgba(8, 8, 8, .92);
            font-family: ArialPixel, monospace;
            font-size: .7rem;
            color: #fff;
            opacity: 0;
            pointer-events: none;
            transition: opacity .2s;
            flex-direction: column;
            padding: 12px 14px;
            gap: 5px
        }

        body:hover #config {
            opacity: 1;
            pointer-events: all
        }

        .cfg-row {
            gap: 10px
        }
    </style>
</head>

<body>
    <div id="value">0.00%</div>
    <div id="bar-track">
        <div id="bar-fill"></div>
    </div>

    <div id="config">
        <div class="cfg-row"><label>port</label> <input id="cfg-port" type="text" value="4455"></div>
        <div class="cfg-row"><label>token</label> <input id="cfg-token" type="password" placeholder="none"></div>
        <div class="cfg-row"><label>font</label> <select id="cfg-font"></select></div>
        <div class="cfg-row"><label>anchor</label> <select id="cfg-anchor">
                <option>left</option>
                <option>center</option>
                <option>right</option>
            </select></div>
        <div class="cfg-row"><label>left</label> <span class="key-btn" id="cfg-left">a</span></div>
        <div class="cfg-row"><label>right</label> <span class="key-btn" id="cfg-right">d</span></div>
        <div class="cfg-row"><label>reset</label> <span class="key-btn" id="cfg-reset">h</span></div>
    </div>

    <script type="module">
        import { RAW_CODE_TO_KEY_NAME, MOUSE_BUTTON_MAP, FONT_FAMILY_LINKS } from "../scripts/consts.js";

        const $ = id => document.getElementById(id);
        const ALL_FONTS = { unispace: "https://fonts.googleapis.com/css2?family=Unispace&display=swap", ...FONT_FAMILY_LINKS };
        const elValue = $("value"), elFill = $("bar-fill");

        {
            const url = ALL_FONTS["ArialPixel"];
            if (url?.startsWith("data:")) {
                const fmt = (url.match(/\/([^;]+);/) || [])[1] || "truetype";
                const s = document.createElement("style");
                s.textContent = `@font-face{font-family:ArialPixel;src:url("${url}") format("${fmt}")}`;
                document.head.appendChild(s);
            }
        }

        const keyName = code => typeof code === "string"
            ? (code.startsWith("mb") ? MOUSE_BUTTON_MAP[parseInt(code.slice(2))] ?? code : code)
            : (RAW_CODE_TO_KEY_NAME[code] ?? String(code));

        const saved = JSON.parse(localStorage.getItem("sync-cfg") || "{}");
        const cfg = {
            port: saved.port ?? "4455", token: saved.token ?? "",
            font: saved.font ?? "Arial", anchor: saved.anchor ?? "center",
            keyLeft: saved.keyLeft ?? 65, keyRight: saved.keyRight ?? 68, resetKey: saved.resetKey ?? 72,
        };
        if (typeof cfg.resetKey === "string" && cfg.resetKey.length === 1)
            cfg.resetKey = cfg.resetKey.toUpperCase().charCodeAt(0);
        const save = () => localStorage.setItem("sync-cfg", JSON.stringify(cfg));

        function applyFont(key) {
            $("dyn-font")?.remove();
            elValue.style.fontFamily = "";
            const url = ALL_FONTS[key];
            if (!url) return;
            const s = document.createElement("style");
            s.id = "dyn-font";
            if (url.startsWith("data:")) {
                const fmt = (url.match(/\/([^;]+);/) || [])[1] || "truetype";
                s.textContent = `@font-face{font-family:F;src:url("${url}") format("${fmt}")}`;
                elValue.style.fontFamily = "F";
            } else {
                s.textContent = `@import url("${url}")`;
                elValue.style.fontFamily = `"${(url.match(/family=([^&:+]+)/) || [])[1]?.replace(/\+/g, " ") ?? key}"`;
            }
            document.head.appendChild(s);
        }

        const applyAnchor = a => elValue.style.textAlign = a;

        let syncedTicks = 0, totalTicks = 0, lastDx = 0, resetHeld = false;
        const keyStates = {};
        const doReset = () => { syncedTicks = 0; totalTicks = 0; render(); };

        function render() {
            if (!totalTicks) {
                elValue.textContent = "0.00%"; elValue.className = "";
                elFill.style.width = "0%"; elFill.className = ""; return;
            }
            const pct = (syncedTicks / totalTicks) * 100;
            const cls = pct >= 80 ? "synced" : pct >= 60 ? "mid" : "low";
            elValue.textContent = pct.toFixed(2) + "%"; elValue.className = cls;
            elFill.style.width = pct.toFixed(2) + "%"; elFill.className = cls === "synced" ? "" : cls;
        }

        function tick(a, d, dir) {
            if ((!a && !d) || (a && d) || dir === 0) return;
            totalTicks++;
            if ((a && dir < 0) || (d && dir > 0)) syncedTicks++;
            render();
        }

        let ws = null, capturing = null;

        function connect() {
            if (ws) { ws.onclose = null; ws.close(); }
            let next;
            try { next = new WebSocket("ws://localhost:" + cfg.port); } catch { return; }
            ws = next;
            let authed = true;
            ws.onopen = () => ws.send(JSON.stringify({ type: "auth", token: cfg.token }));
            ws.onmessage = e => {
                let data; try { data = JSON.parse(e.data); } catch { return; }
                if (data.type === "auth_response") {
                    if (data.status === "error" || data.status === "failed") { authed = false; ws.close(); }
                    return;
                }
                if (!authed) return;
                const t = data.event_type;
                if (t === "mouse_moved" || t === "mouse_dragged") {
                    lastDx = data.dx ?? 0;
                    tick(!!keyStates[cfg.keyLeft], !!keyStates[cfg.keyRight], lastDx); return;
                }
                if (t === "mouse_pressed") {
                    const id = `mb${data.button ?? 1}`;
                    if (capturing) { finishCapture(id); return; }
                    if (id === String(cfg.resetKey)) { doReset(); return; }
                    keyStates[id] = true; return;
                }
                if (t === "mouse_released") { delete keyStates[`mb${data.button ?? 1}`]; return; }
                if (t === "mouse_wheel") {
                    const id = (data.rotation ?? 0) < 0 ? "scroll_up" : "scroll_down";
                    if (capturing) { finishCapture(id); return; }
                    if (id === String(cfg.resetKey)) { doReset(); return; }
                    tick(id === cfg.keyLeft || !!keyStates[cfg.keyLeft], id === cfg.keyRight || !!keyStates[cfg.keyRight], lastDx); return;
                }
                if (t === "key_pressed") {
                    if (capturing) return;
                    if (typeof cfg.resetKey === "number" && data.rawcode === cfg.resetKey) {
                        if (!resetHeld) { resetHeld = true; doReset(); } return;
                    }
                    keyStates[data.rawcode] = true; return;
                }
                if (t === "key_released") {
                    if (typeof cfg.resetKey === "number" && data.rawcode === cfg.resetKey) resetHeld = false;
                    delete keyStates[data.rawcode]; return;
                }
            };
            ws.onclose = () => {
                for (const k in keyStates) delete keyStates[k];
                resetHeld = false;
                setTimeout(connect, 2000);
            };
        }

        $("cfg-font").innerHTML = Object.keys(ALL_FONTS).map(k => `<option${k === cfg.font ? " selected" : ""}>${k}</option>`).join("");
        $("cfg-port").value = cfg.port;
        $("cfg-token").value = cfg.token;
        $("cfg-anchor").value = cfg.anchor;
        $("cfg-left").textContent = keyName(cfg.keyLeft);
        $("cfg-right").textContent = keyName(cfg.keyRight);
        $("cfg-reset").textContent = keyName(cfg.resetKey);
        applyFont(cfg.font);
        applyAnchor(cfg.anchor);

        $("cfg-port").addEventListener("change", e => { cfg.port = e.target.value.trim(); save(); connect(); });
        $("cfg-token").addEventListener("change", e => { cfg.token = e.target.value; save(); connect(); });
        $("cfg-font").addEventListener("change", e => { cfg.font = e.target.value; save(); applyFont(cfg.font); });
        $("cfg-anchor").addEventListener("change", e => { cfg.anchor = e.target.value; save(); applyAnchor(cfg.anchor); });

        function finishCapture(code) {
            const el = $("cfg-" + capturing);
            el.classList.remove("listening");
            cfg[capturing === "left" ? "keyLeft" : capturing === "right" ? "keyRight" : "resetKey"] = code;
            el.textContent = keyName(code);
            capturing = null; save();
        }

        ["left", "right", "reset"].forEach(type => $("cfg-" + type).addEventListener("click", () => {
            if (capturing) $("cfg-" + capturing).classList.remove("listening");
            capturing = type;
            $("cfg-" + type).classList.add("listening");
            $("cfg-" + type).textContent = "...";
        }));

        document.addEventListener("keydown", e => {
            if (capturing) { e.preventDefault(); finishCapture(e.keyCode); return; }
            if (!e.repeat && typeof cfg.resetKey === "number" && e.keyCode === cfg.resetKey) doReset();
        });

        connect();
    </script>
</body>

</html>
