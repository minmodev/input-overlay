name: release ws-server

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    uses: ./.github/workflows/_build.yml
    with:
      windows-artifact-name: windows-zip
      linux-artifact-name: linux-zip

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: download windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-zip

      - name: download linux artifact
        uses: actions/download-artifact@v4
        with:
          name: linux-zip

      - name: get previous tag
        id: prev_tag
        run: |
          prev=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "tag=$prev" >> "$GITHUB_OUTPUT"

      - name: generate checksums
        id: checksums
        run: |
          sha256sum input-overlay-ws-windows.zip input-overlay-ws-linux.zip | tee checksums.sha256
          win=$(sha256sum input-overlay-ws-windows.zip | awk '{print $1}')
          lin=$(sha256sum input-overlay-ws-linux.zip  | awk '{print $1}')
          echo "windows=$win" >> "$GITHUB_OUTPUT"
          echo "linux=$lin"   >> "$GITHUB_OUTPUT"

      - name: make release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            input-overlay-ws-windows.zip
            input-overlay-ws-linux.zip
            checksums.sha256
          body: |
            ## input-overlay websocket server ${{ github.ref_name }}

            # **patchnotes:**

            -



            ## **windows setup:**

            - download `input-overlay-ws-windows.zip`

            - unzip and run `input-overlay-ws.exe`

            - right-click the tray icon for settings

            > [!NOTICE]
            > you might need to run the ws server as admin when tabbed into apps that run with admin elevations themselves
            > the "start with windows" checkbox will automatically start the ws server with admin rights on the next boot

            ## **linux setup (experimental):**

            -   download `input-overlay-ws-linux.zip`
            -   **linux perms needed:** keyboard/mouse capture and analog devices need access to `/dev/input`, `/dev/hidraw`, and `/dev/bus/usb`:

                ```bash
                # for general inputs
                sudo usermod -aG input $USER
                
                # for analogsense support
                printf '%s\n' \
                  'KERNEL=="hidraw*", SUBSYSTEM=="hidraw", MODE="0660", GROUP="input"' \
                  'SUBSYSTEM=="usb", ATTRS{idVendor}=="31e3", MODE="0660", GROUP="input"' \
                  'SUBSYSTEM=="usb", ATTRS{idVendor}=="03eb", MODE="0660", GROUP="input"' \
                  'SUBSYSTEM=="usb", ATTRS{idVendor}=="1532", MODE="0660", GROUP="input"' \
                  'SUBSYSTEM=="usb", ATTRS{idVendor}=="19f5", MODE="0660", GROUP="input"' \
                  'SUBSYSTEM=="usb", ATTRS{idVendor}=="352d", MODE="0660", GROUP="input"' \
                  'SUBSYSTEM=="usb", ATTRS{idVendor}=="3434", MODE="0660", GROUP="input"' \
                  'SUBSYSTEM=="usb", ATTRS{idVendor}=="362d", MODE="0660", GROUP="input"' \
                  'SUBSYSTEM=="usb", ATTRS{idVendor}=="373b", MODE="0660", GROUP="input"' \
                  'SUBSYSTEM=="usb", ATTRS{idVendor}=="372e", MODE="0660", GROUP="input"' \
                  | sudo tee /etc/udev/rules.d/99-analogsense.rules
                
                sudo udevadm control --reload-rules && sudo udevadm trigger
                ```
            -  **restart** for the group change and usb rule to take effect
            -   unzip and run `./input-overlay-ws`
            -   left-click or right-click the tray icon for settings
            -   if the tray icon doesn't appear, a control window will open automatically instead

            > [!NOTICE]
            > some distros might require you installing libhid and its dependencies manually for analogsense support

            ## **checksum:**

            | file | sha256 |
            |------|--------|
            | `input-overlay-ws-windows.zip` | `${{ steps.checksums.outputs.windows }}` |
            | `input-overlay-ws-linux.zip` | `${{ steps.checksums.outputs.linux }}` |

            a `checksums.sha256` file is also attached to this release. verify with:

            **linux:** `sha256sum -c checksums.sha256`

            **windows:** `Get-FileHash input-overlay-ws-windows.zip -Algorithm SHA256`

            ---
            > [!WARNING]
            > all builds are created via github actions directly from the repo sources
            > the ws server migh might occasionally trigger a false positive on windows defender due to it not being signed and how we handle rawinputbuffer reads via an "invisible background window"
            > alternatively you can build the ws server yourself. see the readme for instructions :p
            
            ${{ steps.prev_tag.outputs.tag != '' && format('[CHANGELOG]({0}/{1}/compare/{2}...{3})', github.server_url, github.repository, steps.prev_tag.outputs.tag, github.ref_name) || 'First release.' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
