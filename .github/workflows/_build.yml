name: build ws-server

on:
  workflow_call:
    inputs:
      windows-artifact-name:
        type: string
        default: windows-zip
      linux-artifact-name:
        type: string
        default: linux-zip
      retention-days:
        type: number
        default: 0

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable

      - name: rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ws-server/src-tauri

      - name: build ws-server exe
        working-directory: ws-server/src-tauri
        run: cargo build --release

      - name: create windows zip
        run: |
          mkdir windows-release
          copy ws-server\src-tauri\target\release\input-overlay-ws.exe windows-release\
          powershell Compress-Archive -Path windows-release\* -DestinationPath input-overlay-ws-windows.zip

      - name: attest windows build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: input-overlay-ws-windows.zip

      - name: upload windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.windows-artifact-name }}
          path: input-overlay-ws-windows.zip
          retention-days: ${{ inputs.retention-days }}

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libudev-dev

      - name: setup rust
        uses: dtolnay/rust-toolchain@stable

      - name: rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ws-server/src-tauri

      - name: build ws-server binary
        working-directory: ws-server/src-tauri
        run: cargo build --release

      - name: create linux zip
        run: |
          mkdir linux-release
          cp ws-server/src-tauri/target/release/input-overlay-ws linux-release/
          cd linux-release && zip -r ../input-overlay-ws-linux.zip .

      - name: attest linux build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: input-overlay-ws-linux.zip

      - name: upload linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.linux-artifact-name }}
          path: input-overlay-ws-linux.zip
          retention-days: ${{ inputs.retention-days }}
